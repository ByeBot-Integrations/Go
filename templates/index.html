<!DOCTYPE html>
<html>
<head>
    <title>Ray CAPTCHA - Go Demo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
        }
        .container {
            width: 100%;
            max-width: 360px;
            background: #1e1e2e;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        form { display: flex; flex-direction: column; gap: 0.75rem; }
        input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: #2a2a3e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 0.95rem;
        }
        input:focus { outline: 2px solid #6366f1; }
        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { opacity: 0.9; }
        .captcha-widget { min-height: 48px; margin: 0.5rem 0; }
    </style>
</head>
<body>
    <h1>Ray CAPTCHA - Go Demo</h1>
    <div class="container">
        <form action="/submit" method="POST">
            <input name="username" type="text" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <div class="captcha-widget" data-sitekey="{{.SiteKey}}"></div>
            <button type="submit">Login</button>
        </form>
    </div>
    <script src="{{.BaseURL}}/ray/widget.js"></script>
</body>
</html>
